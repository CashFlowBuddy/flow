services:
  db:
    image: mariadb:11.4
    container_name: flow-db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_NAME:-flow}
      MARIADB_USER: ${DB_USER:-flow}
      MARIADB_PASSWORD: ${DB_PASSWORD:-flow}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -p$${MARIADB_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flow-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 3000
      DATABASE_URL: mysql://${DB_USER:-flow}:${DB_PASSWORD:-flow}@db:3306/${DB_NAME:-flow}
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - uploads:/usr/src/app/uploads

volumes:
  db_data:
  uploads:
